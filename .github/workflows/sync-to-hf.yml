name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, master]

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Hugging Face Hub
        run: pip install -U huggingface_hub

      - name: Upload Repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "from huggingface_hub import HfApi; import os; api = HfApi(token=os.environ.get('HF_TOKEN')); api.upload_folder(folder_path='.', repo_id='arifsoul/sign_language_translator', repo_type='space', commit_message='Sync GitHub to Space', ignore_patterns=['.git/*', '.github/*'])"
